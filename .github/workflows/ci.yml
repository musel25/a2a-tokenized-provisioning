name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive # Foundry libs arrive as submodules (M1.2)
      - uses: astral-sh/setup-uv@v8.2.0 # exact pin: no v8 major-version alias is published
        with:
          enable-cache: true
      # Since M1.5 the python job needs Foundry too: chainmcp's cross-stack signature
      # tests spawn a live anvil and load forge-built ABIs — the one seam (Python signs,
      # Solidity verifies) that neither language's unit tests can catch alone.
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge build --root contracts
      - run: uv sync --all-packages
      - run: uv run pytest -v
      - run: uv run ruff check .

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: forge test
        run: |
          if [ -f contracts/foundry.toml ]; then
            cd contracts && forge test -vv
          else
            echo "contracts/ not yet created — arrives at M1.1"
          fi
